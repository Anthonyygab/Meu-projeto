<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher — Cadastro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

  <canvas id="particles"></canvas>

  <div class="container">

    <div class="logo-wrap">
      <div class="logo-icon">C/</div>
      <div class="logo-name">Cipher</div>
      <div class="logo-divider"></div>
      <div class="logo-sub">Secure Access System</div>
    </div>

    <div class="input-wrap">
      <i class="ti ti-user"></i>
      <input type="text" id="usuario" placeholder="Usuário" autocomplete="username">
    </div>
    <div class="input-wrap">
      <i class="ti ti-lock"></i>
      <input type="password" id="senha" placeholder="Senha" autocomplete="new-password">
    </div>
    <div class="input-wrap">
      <i class="ti ti-lock-check"></i>
      <input type="password" id="confirmar" placeholder="Confirmar senha" autocomplete="new-password">
    </div>

    <button type="button" id="btnCadastrar" onclick="cadastrar()">Cadastrar</button>

    <p id="mensagem"></p>

    <p>Já tem conta? <a href="index.html">Login</a></p>
  </div>

  <script src="script.js"></script>
  <script src="particles.js"></script>

</body>
</html>
