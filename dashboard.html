<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body style="display: none;">

  <div class="dashboard">

    <div class="topo">
      <div class="logo-row">
        <div class="logo-icon">C/</div>
        <div>
          <div class="logo-name">Cipher</div>
          <div id="hora" class="topo-hora"></div>
        </div>
      </div>
      <div class="topo-right">
        <span id="user" class="topo-greeting"></span>
        <button onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total de usuários</h3>
        <p id="totalUsuarios">—</p>
        <span class="card-sub">cadastrados</span>
      </div>
      <div class="card">
        <h3>Último login</h3>
        <p id="ultimoLogin">—</p>
        <span class="card-sub">mais recente</span>
      </div>
      <div class="card">
        <h3>Status</h3>
        <p style="color: #4affb4;">● Online</p>
        <span class="card-sub">sistema ativo</span>
      </div>
    </div>

    <div class="paineis">

      <div class="painel">
        <h3 class="painel-titulo">Usuários cadastrados</h3>
        <div id="listaUsuarios">Carregando...</div>
      </div>

      <div class="painel">
        <h3 class="painel-titulo">Histórico de logins</h3>
        <div id="listaLogins">Carregando...</div>
      </div>

    </div>

    <div class="painel" style="margin-top: 16px;">
      <h3 class="painel-titulo">Cadastros recentes</h3>
      <div class="grafico-wrap" id="grafico">Carregando...</div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
